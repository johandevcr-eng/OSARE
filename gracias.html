<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Gracias por contactar a OSARE CR.">
    <meta name="robots" content="noindex, nofollow">
    <title>Gracias | OSARE</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .thanks-wrap {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 2rem 1rem;
        }

        .thanks-card {
            width: min(720px, 94vw);
            background: rgba(255, 255, 255, 0.9);
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 14px 40px rgba(0, 0, 0, 0.15);
            text-align: center;
        }

        .thanks-card h1 {
            margin: 0 0 0.6rem;
            font-size: clamp(1.8rem, 3vw, 2.4rem);
        }

        .thanks-card p {
            margin: 0.5rem 0;
        }

        .thanks-actions {
            margin-top: 1.3rem;
            display: flex;
            gap: 0.8rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .thanks-btn {
            display: inline-block;
            padding: 0.7rem 1rem;
            border-radius: 0.6rem;
            text-decoration: none;
            font-weight: 600;
            border: 1px solid #1f2937;
            color: #1f2937;
            background: #ffffff;
        }

        .thanks-btn-primary {
            background: #1f2937;
            color: #ffffff;
        }
    </style>
</head>
<body>
    <main class="thanks-wrap">
        <section class="thanks-card" aria-label="Confirmacion de envio">
            <h1>Gracias por escribirnos</h1>
            <p>Recibimos tu mensaje correctamente.</p>
            <p>Te responderemos lo antes posible.</p>
            <div class="thanks-actions">
                <a class="thanks-btn thanks-btn-primary" href="index.html">Ir al inicio</a>
                <a class="thanks-btn" href="contacto.html">Enviar otro mensaje</a>
            </div>
        </section>
    </main>
</body>
</html>
