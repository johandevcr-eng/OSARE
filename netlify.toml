# netlify.toml — raiz del repositorio 
# Sin paso de build: el repositorio se publica tal cual 
 
[build] 
  publish = "." 
 
# Cabeceras de seguridad HTTP para todas las paginas 
[[headers]] 
  for = "/*" 
  [headers.values] 
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload" 
    X-Frame-Options            = "DENY" 
    X-Content-Type-Options     = "nosniff" 
    Referrer-Policy            = "strict-origin-when-cross-origin" 
 
# Cache optimo para assets estaticos (imagenes, CSS, JS) 
[[headers]] 
  for = "/img/*" 
  [headers.values] 
    Cache-Control = "public, max-age=31536000, immutable" 
 
[[headers]] 
  for = "/*.css" 
  [headers.values] 
    Cache-Control = "public, max-age=31536000, immutable" 

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
 
[[headers]] 
  for = "/video/*" 
  [headers.values] 
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
